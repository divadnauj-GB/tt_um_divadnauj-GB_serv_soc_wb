# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "gpio_i[0]"
  ui[1]: "gpio_i[1]"
  ui[2]: "gpio_i[2]"
  ui[3]: "gpio_i[3]"
  ui[4]: "gpio_i[4]"
  ui[5]: "gpio_i[5]"
  ui[6]: "gpio_i[6]"
  ui[7]: "gpio_i[7]"

  # Outputs
  uo[0]: "gpio_o[0]"
  uo[1]: "gpio_o[1]"
  uo[2]: "gpio_o[2]"
  uo[3]: "gpio_o[3]"
  uo[4]: "gpio_o[4]"
  uo[5]: "gpio_o[5]"
  uo[6]: "gpio_o[6]"
  uo[7]: "gpio_o[7]"

  # Bidirectional pins
  uio[0]: "cs_flash"
  uio[1]: "sio0"
  uio[2]: "sio1"
  uio[3]: "sck"
  uio[4]: "uart0_tx"
  uio[5]: "uart0_rx"
  uio[6]: "cs_ram0"
  uio[7]: "cs_ram1"

